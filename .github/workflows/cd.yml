name: CD

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  check:
    uses: wspulse/.github/.github/workflows/go-check.yml@main

  release:
    runs-on: ubuntu-latest
    needs: [check]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
